{{ template "base" . }}

{{- define "content" }}
<div class="container mx-auto px-4 py-12">
  <div class="max-w-md mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8">
      <h1 class="text-3xl font-bold text-center mb-8">{{ call .T "sms.register.title" }}</h1>

      <form id="registerForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium mb-2">{{ call .T "sms.register.email" }}</label>
          <input type="email"
                 name="email"
                 required
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600"
                 placeholder="your@email.com">
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">{{ call .T "sms.register.password" }}</label>
          <input type="password"
                 name="password"
                 required
                 minlength="8"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600"
                 placeholder="••••••••">
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">{{ call .T "sms.register.confirm_pwd" }}</label>
          <input type="password"
                 name="confirm_password"
                 required
                 minlength="8"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600"
                 placeholder="••••••••">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition">
          {{ call .T "sms.register.btn" }}
        </button>
      </form>

      <div class="mt-6">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white dark:bg-gray-800 text-gray-500">OR</span>
          </div>
        </div>

        <button class="mt-4 w-full flex items-center justify-center gap-2 px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          {{ call .T "sms.register.google" }}
        </button>
      </div>

      <p class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400">
        {{ call .T "sms.register.has_account" }}
        <a href="/sms/login" class="text-blue-600 hover:underline font-medium">{{ call .T "sms.nav.login" }}</a>
      </p>
    </div>
  </div>
</div>

<script>
// S-03 注册实现（待完善）
document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  if (formData.get('password') !== formData.get('confirm_password')) {
    alert('Passwords do not match!');
    return;
  }
  console.log('[SMS Register] S-03 authentication implementation pending');
  alert('Registration feature coming soon! (S-03)');
});
</script>
{{- end }}
