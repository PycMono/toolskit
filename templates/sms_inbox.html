{{ template "base" . }}

{{ define "content" }}
<div class="container inbox-layout">
  <!-- Phone Info Bar -->
  <div class="phone-info-bar">
    <div class="phone-info-left">
      <span class="phone-flag">📱</span>
      <span class="phone-number" id="phoneDisplay">{{ .Phone }}</span>
      <button class="btn btn-outline btn-sm" onclick="copyPhone()">📋 {{ call .T "sms.copy_number" }}</button>
    </div>
    <div class="phone-info-right">
      <button class="btn btn-outline btn-sm" onclick="refreshMessages()">↻ {{ call .T "sms.refresh" }}</button>
      <div class="auto-refresh-badge">
        <span class="green-dot"></span>
        {{ call .T "sms.auto_refresh" }}: <span id="refreshCountdown">10</span>s
      </div>
    </div>
  </div>

  <div class="inbox-content-layout">
    <!-- Messages Area -->
    <div class="messages-area">
      <h2 class="section-title">{{ call .T "sms.inbox_title" }}</h2>
      <div id="messagesList">
        <!-- Loading state -->
        <div class="waiting-state" id="waitingState">
          <div class="waiting-animation">
            <div class="pulse-ring"></div>
            <span class="waiting-icon">📨</span>
          </div>
          <p class="waiting-text">{{ call .T "sms.waiting" }}</p>
        </div>
        <div id="messagesContainer"></div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="inbox-sidebar">
      <div class="sidebar-card">
        <h4>Other Numbers</h4>
        <div id="otherNumbers">
          <div class="spinner-sm"></div>
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "extraScript" }}
<script>
const phone = '{{ .PhoneURL }}';
const displayPhone = '{{ .Phone }}';
let countdown = 10;
let timer;

function copyPhone() {
  navigator.clipboard.writeText(displayPhone);
  showToast('Copied!');
}

function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if (diff < 60) return diff + ' seconds ago';
  if (diff < 3600) return Math.floor(diff/60) + ' minutes ago';
  return Math.floor(diff/3600) + ' hours ago';
}

function extractCode(text) {
  const m = text.match(/\b(\d{4,8})\b/);
  return m ? m[1] : null;
}

function renderMessages(messages) {
  const container = document.getElementById('messagesContainer');
  const waitingState = document.getElementById('waitingState');

  if (!messages || messages.length === 0) {
    waitingState.style.display = 'flex';
    container.innerHTML = '';
    return;
  }

  waitingState.style.display = 'none';
  container.innerHTML = messages.map(m => {
    const code = m.code || extractCode(m.content);
    return `
      <div class="message-card">
        <div class="message-header">
          <span class="message-from">📨 ${m.from}</span>
          <span class="message-time">${m.received_at}</span>
        </div>
        ${code ? `<div class="message-code">
          <span class="code-label">Verification Code</span>
          <span class="code-value">${code}</span>
          <button class="btn btn-primary btn-xs" onclick="navigator.clipboard.writeText('${code}');showToast('Code copied!')">📋 Copy</button>
        </div>` : ''}
        <div class="message-body">${m.content}</div>
      </div>
    `;
  }).join('');
}

function refreshMessages() {
  fetch(`/api/sms/messages/${phone}`)
    .then(r => r.json())
    .then(data => {
      renderMessages(data.messages);
      resetCountdown();
    })
    .catch(() => {});
}

function resetCountdown() {
  countdown = 10;
  document.getElementById('refreshCountdown').textContent = countdown;
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    countdown--;
    document.getElementById('refreshCountdown').textContent = countdown;
    if (countdown <= 0) {
      refreshMessages();
    }
  }, 1000);
}

// Load other numbers for sidebar
fetch(`/api/sms/numbers?country=US&limit=5`)
  .then(r => r.json())
  .then(data => {
    const el = document.getElementById('otherNumbers');
    if (data.list) {
      el.innerHTML = data.list.slice(0,5).map(n =>
        `<a href="/sms/inbox/${encodeURIComponent(n.phone_url)}" class="other-number-item">
          ${n.flag} ${n.phone}
        </a>`
      ).join('');
    }
  }).catch(() => {});

// Initial load
refreshMessages();
startTimer();
</script>
{{ end }}
