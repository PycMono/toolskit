{{ template "base" . }}

{{ define "content" }}
<div class="dev-tool-page page-dev-diff">
  <div class="container">
    <h1 class="tool-title">{{ call .T "tools.diff.title" }}</h1>
    <p class="tool-subtitle">{{ call .T "tools.diff.subtitle" }}</p>

    <div class="diff-panel">
      <div class="form-group">
        <label>{{ call .T "tools.diff.original_label" }}</label>
        <textarea id="originalText" class="form-textarea" rows="10" placeholder="{{ call .T "tools.diff.original_placeholder" }}"></textarea>
      </div>
      <div class="form-group">
        <label>{{ call .T "tools.diff.modified_label" }}</label>
        <textarea id="modifiedText" class="form-textarea" rows="10" placeholder="{{ call .T "tools.diff.modified_placeholder" }}"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="computeDiff()">🔍 {{ call .T "tools.diff.compare_btn" }}</button>
      </div>
      <div class="diff-options">
        <label><input type="checkbox" id="ignoreWhitespace" onchange="updateDiff()"> {{ call .T "tools.diff.ignore_whitespace" }}</label>
      </div>

      <div class="form-group">
        <label>{{ call .T "tools.diff.result_label" }}</label>
        <div id="diffOutput" class="diff-output"></div>
      </div>

      <div class="form-actions">
        <button class="btn btn-secondary" onclick="clearAll()">🗑 {{ call .T "common.clear" }}</button>
      </div>
    </div>

    {{ if .FAQs }}
    <div class="faq-section">
      <h2>{{ call .T "common.faq" }}</h2>
      {{ range .FAQs }}
      <div class="faq-item">
        <h3 class="faq-q">{{ .Q }}</h3>
        <p class="faq-a">{{ .A }}</p>
      </div>
      {{ end }}
    </div>
    {{ end }}
  </div>
</div>

<style>
.page-dev-diff { max-width: 900px; margin: 40px auto; }
.tool-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
.tool-subtitle { color: var(--color-text-muted); margin-bottom: 24px; }
.diff-panel {
  background: var(--color-bg-alt); border-radius: 12px; padding: 24px;
  border: 1px solid var(--color-border);
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 0.85rem; font-weight: 600;
  margin-bottom: 6px; color: var(--color-text);
}
.form-textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--color-border);
  border-radius: 8px; font-size: 0.95rem;
  background: var(--color-bg); color: var(--color-text);
  font-family: 'JetBrains Mono', monospace; resize: vertical;
  box-sizing: border-box;
}
.form-textarea:focus { outline: none; border-color: var(--color-primary); }
.form-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.diff-options { margin: 12px 0; font-size: 0.9rem; }
.diff-options label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.btn {
  padding: 10px 20px; border-radius: 8px; font-size: 0.9rem;
  font-weight: 500; cursor: pointer; border: none;
  transition: all 0.2s;
}
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-secondary { background: var(--color-bg); color: var(--color-text); border: 1px solid var(--color-border); }
.btn-secondary:hover { border-color: var(--color-primary); }
.diff-output {
  background: var(--color-bg); border-radius: 8px; padding: 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
  line-height: 1.6; overflow-x: auto;
  border: 1px solid var(--color-border);
  min-height: 200px; max-height: 500px; overflow-y: auto;
}
.diff-line { padding: 2px 8px; white-space: pre; }
.diff-line.added { background: rgba(34, 197, 94, 0.2); color: #22863a; }
.diff-line.removed { background: rgba(239, 68, 68, 0.2); color: #c62828; text-decoration: line-through; }
.diff-line.unchanged { color: var(--color-text-muted); }
.diff-line.prefix { display: inline-block; width: 40px; color: var(--color-text-muted); user-select: none; }
.faq-section { margin-top: 40px; }
.faq-section h2 { font-size: 1.2rem; margin-bottom: 16px; }
.faq-item { margin-bottom: 16px; }
.faq-q { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
.faq-a { color: var(--color-text-muted); line-height: 1.6; }
</style>

<script>
function computeDiff() {
  const original = document.getElementById('originalText').value.split('\n');
  const modified = document.getElementById('modifiedText').value.split('\n');
  const ignoreWS = document.getElementById('ignoreWhitespace').checked;

  const output = document.getElementById('diffOutput');
  output.innerHTML = '';

  // Simple line-by-line diff using LCS
  const diff = diffLines(original, modified, ignoreWS);

  diff.forEach(line => {
    const div = document.createElement('div');
    div.className = 'diff-line ' + line.type;
    div.innerHTML = '<span class="prefix">' + line.prefix + '</span>' + escapeHtml(line.content);
    output.appendChild(div);
  });
}

function diffLines(a, b, ignoreWS) {
  const result = [];
  const aNorm = ignoreWS ? a.map(l => l.replace(/\s+/g, ' ').trim()) : a;
  const bNorm = ignoreWS ? b.map(l => l.replace(/\s+/g, ' ').trim()) : b;

  // Simple LCS-based diff
  const lcs = longestCommonSubsequence(aNorm, bNorm);
  let ai = 0, bi = 0, li = 0;

  while (ai < a.length || bi < b.length) {
    if (li < lcs.length && ai < a.length && aNorm[ai] === lcs[li] && bi < b.length && bNorm[bi] === lcs[li]) {
      result.push({ type: 'unchanged', prefix: '  ', content: a[ai] });
      ai++; bi++; li++;
    } else if (ai < a.length && (li >= lcs.length || aNorm[ai] !== lcs[li])) {
      result.push({ type: 'removed', prefix: '- ', content: a[ai] });
      ai++;
    } else if (bi < b.length && (li >= lcs.length || bNorm[bi] !== lcs[li])) {
      result.push({ type: 'added', prefix: '+ ', content: b[bi] });
      bi++;
    }
  }
  return result;
}

function longestCommonSubsequence(a, b) {
  const m = a.length, n = b.length;
  const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));

  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (a[i-1] === b[j-1]) {
        dp[i][j] = dp[i-1][j-1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
      }
    }
  }

  // Backtrack to find LCS
  const lcs = [];
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (a[i-1] === b[j-1]) {
      lcs.unshift(a[i-1]);
      i--; j--;
    } else if (dp[i-1][j] > dp[i][j-1]) {
      i--;
    } else {
      j--;
    }
  }
  return lcs;
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function clearAll() {
  document.getElementById('originalText').value = '';
  document.getElementById('modifiedText').value = '';
  document.getElementById('diffOutput').innerHTML = '';
}
</script>
{{ end }}
