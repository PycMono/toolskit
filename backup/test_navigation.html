<!DOCTYPE html>
<html>
<head>
    <title>Navigation Test</title>
    <style>
        .dropdown { position: relative; display: inline-block; }
        .dropdown-menu { display: none; position: absolute; background: white; border: 1px solid #ccc; padding: 10px; }
        .dropdown.open .dropdown-menu { display: block; }
        a { display: block; padding: 5px; }
    </style>
</head>
<body>
    <h1>Navigation Test Page</h1>

    <div class="nav-item has-dropdown dropdown">
        <a href="#" class="nav-link">Privacy Tools ▾</a>
        <div class="dropdown-menu">
            <a href="/password-generator?lang=zh" class="dropdown-item">🔑 Password Generator</a>
            <a href="/sms?lang=zh" class="dropdown-item">📱 SMS Receiver</a>
            <a href="/virtual-address?lang=zh" class="dropdown-item">🏠 Virtual Address</a>
        </div>
    </div>

    <p>Current page: <strong id="currentPage">index</strong></p>

    <script>
// Exact copy of the fixed code
document.querySelectorAll('.nav-item.has-dropdown').forEach(item => {
  const link = item.querySelector('.nav-link');

  if (link) {
    link.addEventListener('click', function (e) {
      // Prevent navigation on parent dropdown trigger only
      e.preventDefault();
      e.stopPropagation();

      // Toggle dropdown open state
      item.classList.toggle('open');
      console.log('Parent link clicked, dropdown toggled');
    });
  }

  // Allow dropdown items to navigate normally - don't prevent their default behavior
  const dropdownItems = item.querySelectorAll('.dropdown-item');
  dropdownItems.forEach(dropdownItem => {
    dropdownItem.addEventListener('click', function(e) {
      // Let the link navigate normally - don't prevent default
      // Just stop propagation so parent doesn't toggle
      e.stopPropagation();
      console.log('Dropdown item clicked, should navigate to:', this.href);
    });
  });
});

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  if (!e.target.closest('.nav-item.has-dropdown')) {
    document.querySelectorAll('.nav-item.has-dropdown').forEach(item => {
      item.classList.remove('open');
    });
  }
});
    </script>
</body>
</html>
